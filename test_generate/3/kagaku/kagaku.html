<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>理科プリント自動生成ツール</title>
<style>
    body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: auto; }
    h1 { font-size: 20px; border-bottom: 2px solid #333; padding-bottom: 10px; }
    .question-list { margin: 20px 0; background: #f9f9f9; padding: 15px; border-radius: 5px; }
    .question-list label { display: block; margin-bottom: 10px; cursor: pointer; }
    textarea { width: 100%; height: 300px; font-family: monospace; margin-top: 10px; }
    button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #4CAF50; color: white; border: none; border-radius: 5px; }
    button:hover { background: #45a049; }
    .copy-btn { background: #2196F3; margin-left: 10px; }
    .copy-btn:hover { background: #0b7dda; }
    #status { margin-top: 10px; color: #d32f2f; font-weight: bold; }
</style>
</head>
<body>

    <h1>中三理科プリント 自動コード生成</h1>
    
    <div class="question-list">
        <h3>問題を選択</h3>
        <label><input type="checkbox" value="q1" checked> 1. 電解質と非電解質</label>
        <label><input type="checkbox" value="q2" checked> 2. 塩化銅水溶液の電気分解</label>
        <label><input type="checkbox" value="q3" checked> 3. 原子の構造と同位体</label>
        <label><input type="checkbox" value="q4" checked> 4. イオンの名称とイオン式</label>
        <label><input type="checkbox" value="q5" checked> 5. 指示薬と水溶液の色</label>
        <label><input type="checkbox" value="q6" checked> 6. 酸・アルカリの正体とpH</label>
        <label><input type="checkbox" value="q7" checked> 7. 中和と塩（えん）</label>
        <label><input type="checkbox" value="q8" checked> 8. 金属のイオンへのなりやすさ</label>
    </div>

    <div>
        <label><input type="radio" name="mode" value="q" checked> 問題用（空欄）</label>
        <label><input type="radio" name="mode" value="a"> 模範解答用（赤字）</label>
    </div>

    <div style="margin-top: 20px;">
        <button onclick="generateCode()">LaTeXコードを生成</button>
        <button class="copy-btn" onclick="copyCode()">コードをコピー</button>
    </div>
    
    <div id="status"></div>

    <textarea id="outputCode" placeholder="ここに生成されたLaTeXコードが表示されます..." readonly></textarea>

<script>
// LaTeXの共通ヘッダー
const headerQuestion = `\\documentclass[11pt]{ltjsarticle}
\\usepackage{tikz}
\\usepackage{amsmath}
\\usepackage{geometry}
\\usepackage{xcolor}
\\geometry{a4paper, margin=1.5cm}

\\begin{document}

\\begin{center}
\\Large \\textbf{中三理科 1学期到達度テスト対策}
\\end{center}
\\begin{flushright}
名前（ \\hspace{6cm} ）
\\end{flushright}
\\vspace{0.5cm}
`;

const headerAnswer = headerQuestion.replace("中三理科 1学期到達度テスト対策", "中三理科 1学期到達度テスト対策 【模範解答】");
const footer = `\n\\end{document}`;

// 非同期(async)で各texファイルを読み込んで結合する関数
async function generateCode() {
    const checkboxes = document.querySelectorAll('.question-list input[type="checkbox"]');
    const mode = document.querySelector('input[name="mode"]:checked').value; // "q" or "a"
    const statusDiv = document.getElementById('status');
    
    statusDiv.textContent = "生成中...";
    document.getElementById('outputCode').value = "";
    
    let outText = (mode === "a") ? headerAnswer : headerQuestion;
    let questionCounter = 1;
    
    for (const cb of checkboxes) {
        if (cb.checked) {
            const fileName = `tex/${cb.value}_${mode}.tex`;
            
            try {
                const response = await fetch(fileName);
                if (!response.ok) {
                    throw new Error("File not found");
                }
                let sectionCode = await response.text();
                
                // 選択した順番に合わせて大問の番号を振り直す
                sectionCode = sectionCode.replace(/\\section\*\{[0-9]+\./, `\\section*{${questionCounter}.`);
                
                outText += sectionCode + "\n\n";
                questionCounter++;
            } catch (error) {
                console.error('Error fetching file:', fileName, error);
                outText += `% エラー: ${fileName} を読み込めませんでした。\n% GitHubへのアップロード忘れやファイル名を確認してください。\n\n`;
            }
        }
    }
    
    outText += footer;
    document.getElementById('outputCode').value = outText;
    statusDiv.textContent = "生成完了！";
    setTimeout(() => { statusDiv.textContent = ""; }, 2000);
}

// クリップボードにコピーする関数
function copyCode() {
    const textarea = document.getElementById('outputCode');
    if(textarea.value === "") {
        alert("先にコードを生成してください。");
        return;
    }
    textarea.select();
    document.execCommand('copy');
    alert("コードをコピーしました！Overleafに貼り付けてください。");
}
</script>

</body>
</html>
